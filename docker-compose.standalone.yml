# Standalone backing services — local self-test ONLY.
#
# kungal normally connects to the Postgres / Redis that kun-galgame-infra owns
# (shared across the ecosystem). This override adds throwaway pg/redis so the
# stack can run on its own, with no oauth repo checked out:
#
#   C="docker compose -f docker-compose.yml -f docker-compose.standalone.yml"
#   $C up -d postgres redis
#   $C run --rm migrate          # ⚠ honour the kungal migration ORDER
#   $C up -d api web
#
# Do NOT use in production — there the umbrella website/compose.yaml provides
# the real shared postgres/redis (oauth must `CREATE DATABASE kungalgame;` in
# its docker/initdb.d, since kungal's data lives in its own DB on that server).
services:
  # Re-add the ordering deps the base file intentionally omits (so a bare
  # `docker compose` on the base alone stays a valid project). postgres/redis
  # ARE defined below in this override, so the dependency resolves here.
  api:
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
  migrate:
    depends_on:
      postgres: { condition: service_healthy }

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGPASS:-kungal_dev_pw}
      POSTGRES_DB: kungalgame
    ports: ["15000:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kungalgame"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["15001:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
