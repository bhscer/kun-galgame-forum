# Run kungal ALONGSIDE an already-running kun-galgame-infra stack.
#
# The base docker-compose.yml does NOT define (or depend on) postgres/redis —
# the infra stack owns them. This override only joins the infra network so the
# service names (postgres, redis, oauth, galgame, image) resolve at runtime.
#
#   docker compose -f docker-compose.yml -f docker-compose.infra.yml build
#   docker compose -f docker-compose.yml -f docker-compose.infra.yml up -d api web
#
# Requires the infra stack to be up first (its compose project name is
# kun-galgame-infra, which creates the external network below). For a local
# self-test without it, use docker-compose.standalone.yml instead.
networks:
  default:
    name: kun-galgame-infra_default
    external: true
