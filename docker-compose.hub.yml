# Run kungal ALONGSIDE an already-running kun-galgame-infra hub.
#
# The base docker-compose.yml does NOT define (or depend on) postgres/redis —
# the hub owns them. This override only joins the hub's network so the service
# names (postgres, redis, oauth, galgame, image) resolve at runtime.
#
#   docker compose -f docker-compose.yml -f docker-compose.hub.yml build
#   docker compose -f docker-compose.yml -f docker-compose.hub.yml up -d api web
#
# Requires the hub stack to be up first (its compose project name is
# kun-galgame-infra, which creates the external network below). For a local
# self-test without the hub, use docker-compose.standalone.yml instead.
networks:
  default:
    name: kun-galgame-infra_default
    external: true
